<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#0ea5a4" />
    <title>Aley — Discover everything in your city</title>
    <meta name="description" content="The official digital platform for Aley. Discover businesses, restaurants, events, and offers across the city." />
    <script>
      // Apply saved theme before paint to avoid a flash.
      try {
        const t = localStorage.getItem("aley-theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
